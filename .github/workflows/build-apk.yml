name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package.json
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install Android SDK platform-tools
        run: sudo apt-get update && sudo apt-get install -y android-sdk-platform-tools
      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm install
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Build web assets
        working-directory: Frontend
        run: npm run build
      - name: Add Android platform
        working-directory: Frontend
        run: npx cap add android || true
      - name: Sync web assets and plugins to Android
        working-directory: Frontend
        run: npx cap sync android
      - name: Ensure Gradle is executable
        working-directory: Frontend/android
        run: chmod +x ./gradlew
      - name: Build debug APK
        working-directory: Frontend/android
        run: ./gradlew assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: splitwise-apk
          path: Frontend/android/app/build/outputs/apk/debug/app-debug.apk
      - name: Create GitHub Release with APK
        uses: ncipollo/release-action@v1
        with:
          tag: "v1.0.${{ github.run_number }}"
          name: "SplitWise APK #${{ github.run_number }}"
          body: "Automated debug APK build from workflow run ${{ github.run_number }}."
          artifacts: "Frontend/android/app/build/outputs/apk/debug/app-debug.apk"
