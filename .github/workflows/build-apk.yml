name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install Android SDK platform-tools
        run: sudo apt-get update && sudo apt-get install -y android-sdk-platform-tools
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          script: echo "Emulator ready"
      - name: Initialize Capacitor config
        working-directory: Frontend
        run: npx cap init splitwise-app com.example.splitwise --web-dir=dist || true
      - name: Add Android platform
        working-directory: Frontend
        run: npx cap add android || true
      - name: Build web assets
        working-directory: Frontend
        run: npm run build
      - name: Copy web assets to Android
        working-directory: Frontend
        run: npx cap copy android
      - name: Ensure Gradle is executable
        working-directory: Frontend/android
        run: chmod +x ./gradlew
      - name: Build debug APK
        working-directory: Frontend/android
        run: ./gradlew assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: splitwise-apk
          path: Frontend/android/app/build/outputs/apk/debug/app-debug.apk
      - name: Create GitHub Release with APK
        uses: ncipollo/release-action@v1
        with:
          tag: "v1.0.${{ github.run_number }}"
          name: "SplitWise APK #${{ github.run_number }}"
          body: "Automated debug APK build from workflow run ${{ github.run_number }}."
          files: "Frontend/android/app/build/outputs/apk/debug/app-debug.apk"
